customization:
  distribution_code_name: trime
  distribution_version: "v3.3.9-0-g6a10567e"
  generator: "Rime::SwitcherSettings"
  modified_time: "Wed Mar  4 20:10:56 2026"
  rime_version: 1.16.1
patch:
  menu/alternative_select_labels: ["①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨"]
  
  schema_list:
    - {schema: pinyin}
    - {schema: wubi86}
    - {schema: wubi86_double_key}
    - {schema: pinyin_jiugong}
  
  key_binder/+:
    sequence:
      up: "Control+j"        # 上移
      down: "Control+k"    # 下移
      reset: "Control+l"      # 重置
      pin: "Control+p"      # 置顶
    bindings:
      - {accept: "Shift+Control+6", select: pinyin, when: always}
      - {accept: "Shift+Control+7", select: wubi86, when: always}
      - {accept: "Shift+Control+8", select: wubi86_double_key, when: always}
      - {accept: "Shift+Control+9", select: pinyin_jiugong, when: always}
  